# API Environment Configurations
# Add your actual API URLs and credentials here

environments:
  development:
    base_url: "https://dev-api.company.com"
    timeout: 30
    retry_attempts: 3
    
  staging:
    base_url: "https://staging-api.company.com"
    timeout: 30
    retry_attempts: 3
    
  production:
    base_url: "https://api.company.com"
    timeout: 60
    retry_attempts: 5

# API Endpoints Configuration
apis:
  lead_generation:
    endpoints:
      create_lead:
        path: "/api/v1/leads"
        method: "POST"
        
      get_lead:
        path: "/api/v1/leads/{lead_id}"
        method: "GET"
        
      update_lead:
        path: "/api/v1/leads/{lead_id}"
        method: "PUT"
        
      delete_lead:
        path: "/api/v1/leads/{lead_id}"
        method: "DELETE"
        
      list_leads:
        path: "/api/v1/leads"
        method: "GET"
        
      lead_status:
        path: "/api/v1/leads/{lead_id}/status"
        method: "GET"
        
      bulk_import:
        path: "/api/v1/leads/bulk-import"
        method: "POST"

# Authentication Configuration
auth:
  type: "bearer"  # Options: bearer, api_key, oauth2, basic
  token_endpoint: "/api/v1/auth/token"
  api_key_header: "X-API-Key"
