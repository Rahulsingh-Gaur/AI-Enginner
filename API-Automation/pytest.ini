[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Smoke tests (quick validation)
    regression: Regression tests
    integration: Integration tests
    functional: Functional tests
    performance: Performance tests
    security: Security tests
    create: Create Lead API tests
    read: Get Lead API tests
    update: Update Lead API tests
    delete: Delete Lead API tests
    list: List Leads API tests
    status: Lead Status API tests
    bulk: Bulk Import API tests
    positive: Positive test cases
    negative: Negative test cases

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    -ra

# Parallel execution (uncomment if using pytest-xdist)
# addopts = -n auto

# Coverage
# addopts = --cov=src --cov-report=html --cov-report=term

# HTML Report
# addopts = --html=reports/report.html --self-contained-html

# Allure Report
# addopts = --alluredir=reports/allure-results

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout (requires pytest-timeout)
timeout = 300
